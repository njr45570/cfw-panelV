
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CFW — لوحة الإدارة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0f13;font-family:'Segoe UI',sans-serif;}
.card{background:#1a1d24;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:48px 40px;width:100%;max-width:400px;text-align:center;}
.logo{font-size:48px;margin-bottom:20px;}
h1{color:#fff;font-size:24px;margin-bottom:8px;font-weight:600;}
p{color:rgba(255,255,255,.45);font-size:14px;margin-bottom:32px;line-height:1.6;}
.btn-discord{display:flex;align-items:center;justify-content:center;gap:12px;background:#5865F2;color:#fff;text-decoration:none;padding:14px 24px;border-radius:12px;font-size:16px;font-weight:600;transition:background .2s;}
.btn-discord:hover{background:#4752c4;}
.btn-discord svg{width:24px;height:24px;flex-shrink:0;}
.error{background:rgba(220,60,60,.12);border:1px solid rgba(220,60,60,.25);color:#e07a7a;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:20px;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️</div>
  <h1>لوحة إدارة CFW</h1>
  <p>سجّل دخولك عبر ديسكورد — فقط الأدمنز المضافون يقدرون يدخلون.</p>
  <div class="error" id="err"></div>
  <a href="/auth/login" class="btn-discord">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    تسجيل الدخول عبر ديسكورد
  </a>
</div>
<script>
const p = new URLSearchParams(location.search);
const err = p.get("error");
if(err){
  const el = document.getElementById("err");
  el.style.display = "block";
  el.textContent = err === "not_admin" ? "⛔ هذا الحساب غير مضاف كأدمن." : "❌ حدث خطأ، حاول مرة ثانية.";
}
</script>
</body>
</html>
